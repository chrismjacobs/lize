{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container-lg" style="max-width:460px;">
    <div class="lize-card p-4 p-md-5 mt-3">

      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🌏</div>
        <h2 style="color:var(--navy);font-weight:800;">Welcome back</h2>
        <p style="color:var(--text-muted);">Log in to your Li-Ze Academy account</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="your@email.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-lize w-100 btn-lg">Log In</button>
      </form>

      <hr class="my-4">
      <p class="text-center mb-0" style="color:var(--text-muted);font-size:0.9rem;">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" style="color:var(--coral);font-weight:600;">Join Li-Ze Academy</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
