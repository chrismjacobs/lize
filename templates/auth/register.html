{% extends 'base.html' %}
{% block title %}Join Li-Ze Academy{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container-lg" style="max-width:500px;">
    <div class="lize-card p-4 p-md-5 mt-3">

      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🌱</div>
        <h2 style="color:var(--navy);font-weight:800;">Join Li-Ze Academy</h2>
        <p style="color:var(--text-muted);">Create your free account to access your personal journal</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label" for="student_id">Student ID</label>
          <input type="text" id="student_id" name="student_id" class="form-control"
                 placeholder="8-digit student number" required autofocus
                 pattern="\d{8}" maxlength="8" inputmode="numeric">
          <div class="form-text">Your 8-digit MCUT student ID number.</div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="name">Full name</label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Your full name" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="your@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="nationality">Nationality <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
          <input type="text" id="nationality" name="nationality" class="form-control"
                 placeholder="e.g. Indonesian, Taiwanese, Vietnamese…">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="mb-4">
          <label class="form-label" for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="Repeat your password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-lize w-100 btn-lg">Create Account</button>
      </form>

      <hr class="my-4">
      <p class="text-center mb-0" style="color:var(--text-muted);font-size:0.9rem;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="color:var(--coral);font-weight:600;">Log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
